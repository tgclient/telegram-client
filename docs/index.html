        * {

        html {

        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            /* 使用 dvh 适配移动端动态地址栏 */
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            /* 移除 align-items: center 防止溢出截断 */
            padding: 16px;
            /* 刘海屏安全区域 */
            padding-top: max(16px, env(safe-area-inset-top));
            padding-bottom: max(16px, env(safe-area-inset-bottom));
            padding-left: max(16px, env(safe-area-inset-left));
            padding-right: max(16px, env(safe-area-inset-right));
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            padding: 24px 20px;
            max-width: 500px;
            width: 100%;
            /* 限制最大高度，留出上下边距 */
            max-height: calc(100dvh - 32px);
            max-height: calc(100vh - 32px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
            /* 垂直居中且可滚动 */
            margin: auto;
            overflow-y: auto;
            /* 平滑滚动 */
            scrollbar-width: thin;
        }
        
        /* 隐藏滚动条但保持功能 */
        .container::-webkit-scrollbar {
            width: 4px;
        }
        .container::-webkit-scrollbar-track {
            background: transparent;
        }
        .container::-webkit-scrollbar-thumb {
            background: #ddd;
            border-radius: 2px;
        }
        
        .logo {
            width: 72px;
            height: 72px;
            margin: 16px auto 16px;
            border-radius: 50%;
            overflow: hidden;
            background: linear-gradient(135deg, #0088cc 0%, #00aaff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .logo svg {
            width: 48px;
            height: 48px;
            fill: white;
        }
        
        h1 {
            color: #333;
            margin-bottom: 8px;
            font-size: clamp(22px, 5vw, 28px);
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 24px;
            font-size: clamp(13px, 3.5vw, 15px);
            line-height: 1.5;
        }
        
        .features {
            text-align: left;
            margin: 20px 0;
            padding: 16px;
            background: #f8f9fa;
            border-radius: 12px;
        }
        
        .features li {
            list-style: none;
            padding: 6px 0;
            color: #555;
            font-size: clamp(13px, 3.5vw, 15px);
            line-height: 1.5;
        }
        
        .features li:before {
            content: "✓ ";
            color: #28a745;
            font-weight: bold;
            margin-right: 8px;
        }
        
        .download-btn {
            display: inline-block;
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            text-decoration: none;
            padding: 14px 48px;
            border-radius: 30px;
            font-size: clamp(16px, 4vw, 18px);
            font-weight: bold;
            margin: 8px 0 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.4);
            /* 防止按钮被压缩 */
            flex-shrink: 0;
            /* 移动端点击高亮 */
            -webkit-tap-highlight-color: transparent;
        }
        
        .download-btn:active {
            transform: scale(0.96);
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(40, 167, 69, 0.6);
        }
        
        .version {
            color: #999;
            font-size: clamp(12px, 3vw, 14px);
            margin-top: 12px;
            margin-bottom: 12px;
        }
        
        /* 小屏手机额外优化 */
        @media (max-width: 375px) {
            body {
                padding: 12px;
            }
            .container {
                padding: 20px 16px;
                border-radius: 16px;
            }
            .logo {
                width: 64px;
                height: 64px;
            }
            .logo svg {
                width: 40px;
                height: 40px;
            }
            .features {
                padding: 12px;
                margin: 16px 0;
            }
        }
        
        /* 横屏模式 */
        @media (max-height: 500px) and (orientation: landscape) {
            .container {
                display: flex;
                flex-direction: row;
                align-items: center;
                text-align: left;
                gap: 20px;
                padding: 16px;
            }
            .logo {
                margin: 0;
                flex-shrink: 0;
            }
            .content-wrapper {
                flex: 1;
            }
            .features {
                margin: 12px 0;
            }
        }
    </style>
</head>
<body>

                <li>解决收不到验证码、无法登陆等问题。</li>
            </ul>
            
            <a href="https://github.com/tgclient/telegram-client/releases/download/V12.5.1/android.apk" class="download-btn">立即下载</a>
            
            <p class="version">版本 v12.5.1 | Android</p>
        </div>
    </div>
</body>
</html>
